<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#030712"/>
<title>Putting Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#030712;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;max-width:480px;margin:0 auto}
  button{cursor:pointer;border:none;font-family:inherit}
  input{font-family:inherit;font-size:16px}
  .screen{min-height:100vh;padding:16px;display:flex;flex-direction:column}

  /* Home */
  .home-header{text-align:center;margin:32px 0 28px}
  .home-header .emoji{font-size:52px;display:block;margin-bottom:10px}
  .home-header h1{font-size:28px;font-weight:900;letter-spacing:-0.5px}
  .home-header p{color:#6b7280;font-size:14px;margin-top:4px}
  .pb-card{background:#111827;border-radius:20px;padding:20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .pb-card .label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.1em}
  .pb-card .big{font-size:40px;font-weight:900;margin-top:4px}
  .pb-card .sub{font-size:11px;color:#6b7280;margin-top:2px}
  .btn-primary{background:#f59e0b;color:#111827;font-weight:900;font-size:20px;padding:20px;border-radius:20px;width:100%;margin-bottom:12px;box-shadow:0 8px 24px rgba(245,158,11,.25)}
  .btn-primary:active{transform:scale(.97)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
  .btn-secondary{background:#111827;color:#fff;font-weight:700;font-size:15px;padding:18px;border-radius:18px;width:100%}
  .btn-secondary:active{background:#1f2937}
  .recent-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
  .recent-item{background:#111827;border-radius:14px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .recent-item .name{font-size:14px;font-weight:700}
  .recent-item .date{font-size:11px;color:#6b7280;margin-top:2px}
  .recent-score{font-size:22px;font-weight:900}

  /* Setup */
  .setup-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px}
  .setup-wrap h2{font-size:24px;font-weight:900;color:#f59e0b}
  .setup-card{background:#111827;border-radius:20px;padding:24px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:16px}
  .field-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
  .toggle-row{display:flex;gap:10px}
  .toggle-btn{flex:1;padding:10px;border-radius:14px;font-weight:700;font-size:14px;transition:all .15s}
  .field-input{width:100%;background:#1f2937;border:none;border-radius:14px;padding:12px 16px;color:#fff;font-size:16px;outline:none}
  .field-input:focus{box-shadow:0 0 0 2px #f59e0b}
  .btn-cancel{color:#6b7280;font-size:14px;background:none;text-align:center;padding:8px}

  /* Round */
  .round-header{display:flex;justify-content:space-between;align-items:center;margin:8px 0 12px}
  .round-header .quit{color:#6b7280;font-size:14px;background:none}
  .round-header .hole-info{text-align:center}
  .round-header .hole-info .direction{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.1em}
  .round-header .hole-info .hole-num{font-size:26px;font-weight:900;color:#f59e0b}
  .round-header .score-box{text-align:right}
  .round-header .score-box .slabel{font-size:11px;color:#6b7280}
  .round-header .score-box .sval{font-size:22px;font-weight:900}
  .player-tabs{display:flex;gap:8px;margin-bottom:10px}
  .player-tab{flex:1;text-align:center;padding:10px;border-radius:14px;font-size:13px;font-weight:700;transition:all .15s}
  .putt-area{background:#111827;border-radius:20px;padding:28px 20px;display:flex;flex-direction:column;align-items:center;gap:16px;flex:1;justify-content:center}
  .putt-label{font-size:12px;color:#6b7280;text-transform:uppercase;letter-spacing:.1em}
  .putt-buttons{display:flex;gap:14px}
  .putt-btn{width:68px;height:68px;border-radius:18px;font-size:26px;font-weight:900;border:2px solid;transition:all .15s}
  .putt-btn:active{transform:scale(.93)}
  .putt-result{text-align:center;margin-top:4px}
  .putt-result .symbol{font-size:26px}
  .putt-result .result-label{font-weight:700;margin-top:4px;font-size:15px}
  .hole-grid{background:#111827;border-radius:18px;padding:14px}
  .hole-grid-inner{display:grid;grid-template-columns:repeat(9,1fr);gap:4px}
  .hole-cell{aspect-ratio:1;border-radius:8px;font-size:11px;font-weight:700;border:1.5px solid;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .grid-labels{display:flex;justify-content:space-between;margin-top:8px;font-size:10px;color:#6b7280}
  .nav-row{display:flex;gap:10px;margin-top:4px}
  .btn-back{flex:1;background:#111827;color:#d1d5db;font-weight:700;font-size:15px;padding:16px;border-radius:16px}
  .btn-back:disabled{opacity:.3}
  .btn-next{flex:2;font-weight:900;font-size:16px;padding:16px;border-radius:16px;background:#f59e0b;color:#111827}
  .btn-next:disabled{opacity:.3}

  /* Finish */
  .finish-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px;padding:20px}
  .finish-screen .trophy{font-size:56px}
  .finish-screen h2{font-size:32px;font-weight:900;color:#f59e0b}
  .result-card{background:#111827;border-radius:20px;padding:24px;width:100%;max-width:360px;text-align:center}
  .result-card .pname{color:#9ca3af;font-size:14px}
  .result-card .big-score{font-size:64px;font-weight:900;margin-top:4px}
  .result-card .sub{color:#9ca3af;margin-top:4px}
  .result-card .note{margin-top:10px;font-weight:700;font-size:14px}
  .h2h-card{background:#1f2937;border-radius:20px;padding:16px;width:100%;max-width:360px;text-align:center}
  .h2h-card p{color:#9ca3af;font-size:13px;margin-bottom:6px}
  .h2h-card .winner{font-weight:700;font-size:17px}
  .btn-done{background:#f59e0b;color:#111827;font-weight:900;font-size:18px;padding:16px 40px;border-radius:18px}

  /* History */
  .back-header{display:flex;align-items:center;gap:12px;margin:16px 0 24px}
  .back-header button{color:#f59e0b;font-size:22px;background:none}
  .back-header h2{font-size:24px;font-weight:900}
  .player-group h3{color:#f59e0b;font-weight:700;margin-bottom:10px}
  .history-item{background:#111827;border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .history-item .hdate{font-size:11px;color:#6b7280}
  .history-item .hround{font-size:13px;color:#d1d5db;margin-top:2px}
  .history-item .hscore{font-size:24px;font-weight:900}
  .history-item .hpb{font-size:11px;color:#f59e0b}
  .btn-danger{width:100%;margin-top:16px;background:#450a0a;color:#fca5a5;font-weight:700;font-size:14px;padding:14px;border-radius:14px}

  /* Stats */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .stat-card{background:#111827;border-radius:18px;padding:16px;text-align:center}
  .stat-card .slabel{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.08em}
  .stat-card .sval{font-size:30px;font-weight:900;margin-top:6px}
  .avg-card{background:#111827;border-radius:18px;padding:16px;margin-bottom:12px}
  .avg-card h4{font-size:14px;font-weight:700;color:#d1d5db;margin-bottom:12px}
  .avg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center}
  .avg-grid .al{font-size:11px;color:#6b7280}
  .avg-grid .av{font-size:20px;font-weight:900;margin-top:2px}
  .avg-card .birdie-rate{font-size:11px;color:#6b7280;text-align:center;margin-top:10px}
  .chart-card{background:#111827;border-radius:18px;padding:16px;margin-bottom:12px}
  .chart-card h4{font-size:14px;font-weight:700;color:#d1d5db;margin-bottom:12px}
  .chart-wrap{position:relative;height:130px;width:100%}
  .chart-note{font-size:11px;color:#6b7280;text-align:center;margin-top:8px}
  .record-card{background:#111827;border-radius:18px;padding:16px;display:flex;justify-content:space-between;align-items:center}
  .record-card .rc-label{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.08em}
  .record-card .rc-val{font-size:26px;font-weight:900;margin-top:4px}
  .record-card .rc-gap{font-size:16px;font-weight:700;color:#d1d5db;margin-top:4px}
  .empty-state{color:#6b7280;text-align:center;margin-top:100px;font-size:15px}
  canvas{display:block}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Data helpers ──────────────────────────────────────────────────────────────
const HOLES = 18, PAR = 2;
const SS = (s) => s === 0 ? 'E' : s > 0 ? '+'+s : ''+s;
const totalScore = (h) => h.reduce((s,v) => s + (v != null ? v - PAR : 0), 0);
const scoreInfo = (p) => {
  if(p===1) return {label:'Birdie',color:'#f59e0b',symbol:'🐦'};
  if(p===2) return {label:'Par',color:'#22c55e',symbol:'✓'};
  if(p===3) return {label:'Bogey',color:'#ef4444',symbol:'+1'};
  if(p>=4)  return {label:`+${p-2}`,color:'#dc2626',symbol:`+${p-2}`};
  return {label:'-',color:'#6b7280',symbol:'-'};
};
const loadRounds = () => { try{return JSON.parse(localStorage.getItem('pt_rounds')||'[]')}catch{return[]} };
const saveRounds = (r) => { try{localStorage.setItem('pt_rounds',JSON.stringify(r))}catch{} };
const fmtDate = (d) => new Date(d).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
const fmtShort = (d) => new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'});

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  view: 'home',
  rounds: loadRounds(),
  round: null, // {twoPlayer, names, holes[[]], activePlayer, currentHole, finished}
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// ── Canvas chart ──────────────────────────────────────────────────────────────
function drawChart(canvasId, data) {
  requestAnimationFrame(() => {
    const canvas = document.getElementById(canvasId);
    if(!canvas) return;
    const dpr = window.devicePixelRatio||1;
    const w = canvas.offsetWidth, h = canvas.offsetHeight;
    canvas.width = w*dpr; canvas.height = h*dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr,dpr);
    const pad = {t:10,r:10,b:30,l:36};
    const cw = w-pad.l-pad.r, ch = h-pad.t-pad.b;
    const scores = data.map(d=>d.score);
    const minS = Math.min(...scores,-1)-1, maxS = Math.max(...scores,1)+1;
    const range = maxS-minS||1;
    const xStep = data.length > 1 ? cw/(data.length-1) : cw;
    const toY = (s) => pad.t + ch - ((s-minS)/range)*ch;
    const toX = (i) => pad.l + (data.length>1 ? i*xStep : cw/2);
    // grid
    ctx.strokeStyle='#374151'; ctx.lineWidth=1;
    for(let s=Math.ceil(minS);s<=Math.floor(maxS);s++){
      const y=toY(s);
      ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cw,y); ctx.stroke();
      ctx.fillStyle='#6b7280'; ctx.font='10px -apple-system,sans-serif';
      ctx.textAlign='right'; ctx.fillText(SS(s),pad.l-4,y+3);
    }
    // x labels
    ctx.fillStyle='#6b7280'; ctx.font='10px -apple-system,sans-serif'; ctx.textAlign='center';
    data.forEach((d,i)=>{ ctx.fillText(d.round,toX(i),h-8); });
    // line
    ctx.beginPath(); ctx.strokeStyle='#f59e0b'; ctx.lineWidth=2.5; ctx.lineJoin='round';
    data.forEach((d,i)=>{ i===0?ctx.moveTo(toX(i),toY(d.score)):ctx.lineTo(toX(i),toY(d.score)); });
    ctx.stroke();
    // dots
    data.forEach((d,i)=>{
      ctx.beginPath(); ctx.arc(toX(i),toY(d.score),5,0,Math.PI*2);
      ctx.fillStyle='#f59e0b'; ctx.fill();
    });
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const {view,rounds,round} = state;
  if(view==='home')    { app.innerHTML = renderHome(); }
  if(view==='setup')   { app.innerHTML = renderSetup(); }
  if(view==='round')   { app.innerHTML = renderRound(); }
  if(view==='history') { app.innerHTML = renderHistory(); }
  if(view==='stats')   { app.innerHTML = renderStats(); attachStatsListeners(); }
  attachListeners();
  // draw chart if on stats
  if(view==='stats') {
    const names = [...new Set(rounds.map(r=>r.player))];
    const sel = document.getElementById('selPlayer')?.value || names[0];
    if(sel) drawChartForPlayer(sel);
  }
}

// ── Home ──────────────────────────────────────────────────────────────────────
function renderHome() {
  const {rounds} = state;
  const p1name = rounds.length ? rounds[0].player : 'Player 1';
  const myRounds = rounds.filter(r=>r.player===p1name);
  const pb = myRounds.reduce((b,r)=>r.score<b?r.score:b, Infinity);
  const recent = [...rounds].reverse().slice(0,3);
  return `
  <div class="screen">
    <div class="home-header">
      <span class="emoji">⛳</span>
      <h1>Putting Tracker</h1>
      <p>18-Hole Practice Session</p>
    </div>
    <div class="pb-card">
      <div>
        <div class="label">Your PB</div>
        <div class="big" style="color:#f59e0b">${pb!==Infinity?SS(pb):'—'}</div>
        <div class="sub">Record to beat: -6</div>
      </div>
      <div style="text-align:right">
        <div class="label">Rounds</div>
        <div class="big" style="color:#a78bfa">${myRounds.length}</div>
      </div>
    </div>
    <button class="btn-primary" onclick="goSetup()">Start New Round 🏌️</button>
    <div class="grid2">
      <button class="btn-secondary" onclick="setState({view:'history'})">📋 History</button>
      <button class="btn-secondary" onclick="setState({view:'stats'})">📊 Stats</button>
    </div>
    ${recent.length ? `
      <div class="recent-label">Recent Rounds</div>
      ${recent.map(r=>`
        <div class="recent-item">
          <div>
            <div class="name">${r.player}</div>
            <div class="date">${fmtShort(r.date)}</div>
          </div>
          <div class="recent-score" style="color:${r.score<0?'#f59e0b':r.score>0?'#ef4444':'#22c55e'}">${SS(r.score)}</div>
        </div>`).join('')}
    ` : ''}
  </div>`;
}

// ── Setup ─────────────────────────────────────────────────────────────────────
let setupState = {twoPlayer:false, names:['Player 1','Player 2']};
function renderSetup() {
  const {twoPlayer,names} = setupState;
  return `
  <div class="screen">
    <div class="setup-wrap">
      <h2>New Round Setup</h2>
      <div class="setup-card">
        <div>
          <div class="field-label">Mode</div>
          <div class="toggle-row">
            <button class="toggle-btn" style="background:${!twoPlayer?'#f59e0b':'#1f2937'};color:${!twoPlayer?'#111827':'#d1d5db'}" onclick="setMode(false)">Solo</button>
            <button class="toggle-btn" style="background:${twoPlayer?'#f59e0b':'#1f2937'};color:${twoPlayer?'#111827':'#d1d5db'}" onclick="setMode(true)">2 Player</button>
          </div>
        </div>
        <div>
          <div class="field-label">Player 1 Name</div>
          <input class="field-input" id="p1name" value="${names[0]}" oninput="setupState.names[0]=this.value"/>
        </div>
        ${twoPlayer?`
        <div>
          <div class="field-label">Player 2 Name</div>
          <input class="field-input" id="p2name" value="${names[1]}" oninput="setupState.names[1]=this.value"/>
        </div>`:``}
        <button class="btn-primary" onclick="startRound()" style="margin-bottom:0">Start Round 🏌️</button>
        <button class="btn-cancel" onclick="setState({view:'home'})">Cancel</button>
      </div>
    </div>
  </div>`;
}
function setMode(tp) { setupState.twoPlayer=tp; render(); }
function goSetup() { setupState={twoPlayer:false,names:['Player 1','Player 2']}; setState({view:'setup'}); }
function startRound() {
  const n0 = document.getElementById('p1name')?.value || setupState.names[0];
  const n1 = document.getElementById('p2name')?.value || setupState.names[1];
  const names = setupState.twoPlayer ? [n0,n1] : [n0];
  setState({view:'round', round:{
    twoPlayer: setupState.twoPlayer,
    names,
    holes: names.map(()=>Array(HOLES).fill(null)),
    activePlayer: 0,
    currentHole: 0,
    finished: false,
  }});
}

// ── Round ─────────────────────────────────────────────────────────────────────
function renderRound() {
  const {round,rounds} = state;
  if(!round) return '';
  if(round.finished) return renderFinished();
  const {twoPlayer,names,holes,activePlayer,currentHole} = round;
  const curHoles = holes[activePlayer];
  const curPutts = curHoles[currentHole];
  const score = totalScore(curHoles);
  const isLast = currentHole===HOLES-1;
  const isLastAction = isLast && (!twoPlayer || activePlayer===1);
  return `
  <div class="screen">
    <div class="round-header">
      <button class="quit" onclick="if(confirm('Quit this round?'))setState({view:'home',round:null})">✕ Quit</button>
      <div class="hole-info">
        <div class="direction">${currentHole<9?'Clockwise':'Anti-Clockwise'}</div>
        <div class="hole-num">Hole ${currentHole+1}</div>
      </div>
      <div class="score-box">
        <div class="slabel">Score</div>
        <div class="sval" style="color:${score<0?'#f59e0b':score>0?'#ef4444':'#22c55e'}">${SS(score)}</div>
      </div>
    </div>
    ${twoPlayer?`
    <div class="player-tabs">
      ${names.map((n,i)=>`<div class="player-tab" style="background:${activePlayer===i?'#f59e0b':'#1f2937'};color:${activePlayer===i?'#111827':'#9ca3af'}">${n} ${SS(totalScore(holes[i]))}</div>`).join('')}
    </div>`:``}
    <div class="putt-area">
      <div class="putt-label">${twoPlayer?names[activePlayer]+' — ':''}How many putts?</div>
      <div class="putt-buttons">
        ${[1,2,3,4].map(n=>{
          const info=scoreInfo(n);
          const sel=curPutts===n;
          return `<button class="putt-btn" onclick="logPutts(${n})"
            style="background:${sel?info.color+'44':'#1f2937'};border-color:${sel?info.color:'#374151'};color:${sel?info.color:'#9ca3af'};transform:${sel?'scale(1.12)':'scale(1)'}">${n}</button>`;
        }).join('')}
      </div>
      ${curPutts?`<div class="putt-result"><div class="symbol">${scoreInfo(curPutts).symbol}</div><div class="result-label" style="color:${scoreInfo(curPutts).color}">${scoreInfo(curPutts).label}</div></div>`:''}
    </div>
    <div class="hole-grid">
      <div class="hole-grid-inner">
        ${Array(HOLES).fill(null).map((_,i)=>{
          const h=curHoles[i];
          const info=h?scoreInfo(h):null;
          const isCur=i===currentHole;
          return `<button class="hole-cell" onclick="jumpHole(${i})"
            style="background:${isCur?'#f59e0b22':info?info.color+'22':'#1f2937'};border-color:${isCur?'#f59e0b':info?info.color:'#374151'};color:${isCur?'#f59e0b':info?info.color:'#6b7280'}">${h||i+1}</button>`;
        }).join('')}
      </div>
      <div class="grid-labels"><span>← Clockwise (1-9)</span><span>Anti-CW (10-18) →</span></div>
    </div>
    <div class="nav-row">
      <button class="btn-back" onclick="prevHole()" ${currentHole===0&&activePlayer===0?'disabled':''}>← Back</button>
      <button class="btn-next" onclick="nextHole()" ${curPutts==null?'disabled':''}>${isLastAction?'Finish 🏁':'Next →'}</button>
    </div>
  </div>`;
}

function logPutts(n) {
  const r = state.round;
  r.holes = r.holes.map((ph,i)=>i===r.activePlayer?ph.map((h,j)=>j===r.currentHole?n:h):ph);
  render();
}
function jumpHole(i) { state.round.currentHole=i; state.round.activePlayer=0; render(); }
function nextHole() {
  const r = state.round;
  if(r.holes[r.activePlayer][r.currentHole]==null) return;
  if(r.twoPlayer && r.activePlayer===0) { r.activePlayer=1; render(); return; }
  r.activePlayer=0;
  if(r.currentHole===HOLES-1) {
    r.finished=true;
    const saved = r.names.map((name,i)=>({id:Date.now()+i,player:name,holes:r.holes[i],score:totalScore(r.holes[i]),date:new Date().toISOString()}));
    const newRounds = [...state.rounds, ...saved];
    saveRounds(newRounds);
    state.rounds = newRounds;
    render();
  } else {
    r.currentHole++;
    render();
  }
}
function prevHole() {
  const r = state.round;
  if(r.twoPlayer && r.activePlayer===1) { r.activePlayer=0; render(); return; }
  if(r.twoPlayer) r.activePlayer=1;
  if(r.currentHole>0) r.currentHole--;
  render();
}

// ── Finished ──────────────────────────────────────────────────────────────────
function renderFinished() {
  const {round,rounds} = state;
  const {names,holes,twoPlayer} = round;
  return `
  <div class="screen">
    <div class="finish-screen">
      <div class="trophy">🏆</div>
      <h2>Round Complete!</h2>
      ${names.map((name,i)=>{
        const sc=totalScore(holes[i]);
        const pr=rounds.filter(r=>r.player===name);
        const pb=pr.length>1?pr.slice(0,-1).reduce((b,r)=>r.score<b?r.score:b,Infinity):Infinity;
        const isNewPB=sc<pb&&pb!==Infinity;
        const isFirst=pr.length===1;
        return `<div class="result-card">
          <div class="pname">${name}</div>
          <div class="big-score" style="color:${sc<0?'#f59e0b':sc===0?'#22c55e':'#ef4444'}">${SS(sc)}</div>
          <div class="sub">${sc>=0?'+':''}${sc} vs par over 18 holes</div>
          ${isNewPB?'<div class="note" style="color:#f59e0b">🎉 New Personal Best!</div>':''}
          ${isFirst?'<div class="note" style="color:#22c55e">First round recorded!</div>':''}
          ${sc<=-6?'<div class="note" style="color:#c084fc">🔥 You matched the record!</div>':''}
        </div>`;
      }).join('')}
      ${twoPlayer&&names.length===2?`
      <div class="h2h-card">
        <p>Head-to-Head</p>
        <div class="winner">${totalScore(holes[0])<totalScore(holes[1])?'🏆 '+names[0]+' wins!':totalScore(holes[1])<totalScore(holes[0])?'🏆 '+names[1]+' wins!':"It's a tie! 🤝"}</div>
      </div>`:``}
      <button class="btn-done" onclick="setState({view:'home',round:null})">Done</button>
    </div>
  </div>`;
}

// ── History ───────────────────────────────────────────────────────────────────
function renderHistory() {
  const {rounds} = state;
  const grouped = {};
  rounds.forEach(r=>{ if(!grouped[r.player])grouped[r.player]=[]; grouped[r.player].push(r); });
  return `
  <div class="screen">
    <div class="back-header">
      <button onclick="setState({view:'home'})">←</button>
      <h2>Round History</h2>
    </div>
    ${Object.keys(grouped).length===0?'<p class="empty-state">No rounds recorded yet.</p>':''}
    ${Object.entries(grouped).map(([name,rs])=>`
      <div class="player-group">
        <h3>${name}</h3>
        ${[...rs].reverse().map((r,i)=>{
          const pb=r.score===Math.min(...rs.map(x=>x.score));
          return `<div class="history-item">
            <div><div class="hdate">${fmtDate(r.date)}</div><div class="hround">Round ${rs.length-i}</div></div>
            <div style="text-align:right">
              <div class="hscore" style="color:${r.score<0?'#f59e0b':r.score>0?'#ef4444':'#22c55e'}">${SS(r.score)}</div>
              ${pb?'<div class="hpb">PB 🏆</div>':''}
            </div>
          </div>`;
        }).join('')}
      </div>`).join('')}
    ${rounds.length>0?`<button class="btn-danger" onclick="clearHistory()">Clear All History</button>`:''}
  </div>`;
}
function clearHistory() { if(confirm('Delete all rounds?')){ saveRounds([]); setState({rounds:[]}); } }

// ── Stats ─────────────────────────────────────────────────────────────────────
let selPlayer = '';
function renderStats() {
  const {rounds} = state;
  const names = [...new Set(rounds.map(r=>r.player))];
  if(!selPlayer || !names.includes(selPlayer)) selPlayer = names[0]||'';
  const stats = selPlayer ? getStats(selPlayer) : null;
  return `
  <div class="screen">
    <div class="back-header">
      <button onclick="setState({view:'home'})">←</button>
      <h2>Stats & Analysis</h2>
    </div>
    ${names.length===0?'<p class="empty-state">Play some rounds to see stats!</p>':''}
    ${names.length>1?`
    <div style="display:flex;gap:8px;margin-bottom:16px">
      ${names.map(n=>`<button onclick="switchPlayer('${n}')" style="flex:1;padding:10px;border-radius:14px;font-weight:700;font-size:13px;background:${selPlayer===n?'#f59e0b':'#1f2937'};color:${selPlayer===n?'#111827':'#d1d5db'}">${n}</button>`).join('')}
    </div>`:``}
    ${stats?`
    <div class="stat-grid">
      <div class="stat-card"><div class="slabel">Rounds Played</div><div class="sval" style="color:#a78bfa">${stats.rounds}</div></div>
      <div class="stat-card"><div class="slabel">Avg Score</div><div class="sval" style="color:${parseFloat(stats.avg)<0?'#f59e0b':'#ef4444'}">${SS(Math.round(parseFloat(stats.avg)))}</div></div>
      <div class="stat-card"><div class="slabel">Best Round</div><div class="sval" style="color:#f59e0b">${SS(stats.best)}</div></div>
      <div class="stat-card"><div class="slabel">Worst Round</div><div class="sval" style="color:#ef4444">${SS(stats.worst)}</div></div>
    </div>
    <div class="avg-card">
      <h4>Per Round Averages</h4>
      <div class="avg-grid">
        <div><div class="al">Birdies</div><div class="av" style="color:#f59e0b">${stats.avgBirdies}</div></div>
        <div><div class="al">Pars</div><div class="av" style="color:#22c55e">${stats.avgPars}</div></div>
        <div><div class="al">Bogeys</div><div class="av" style="color:#ef4444">${stats.avgBogeys}</div></div>
        <div><div class="al">Doubles+</div><div class="av" style="color:#dc2626">${stats.avgDoubles}</div></div>
      </div>
      <div class="birdie-rate">Birdie rate: ${stats.birdieRate}% of holes</div>
    </div>
    ${stats.chartData.length>1?`
    <div class="chart-card">
      <h4>Score Progression</h4>
      <div class="chart-wrap"><canvas id="scoreChart" style="width:100%;height:100%"></canvas></div>
      <div class="chart-note">Lower is better · Target: -6</div>
    </div>`:``}
    <div class="record-card">
      <div><div class="rc-label">Record</div><div class="rc-val" style="color:#c084fc">-6</div></div>
      <div style="text-align:center"><div class="rc-label">Your PB</div><div class="rc-val" style="color:#f59e0b">${stats.best!==Infinity?SS(stats.best):'—'}</div></div>
      <div style="text-align:right"><div class="rc-label">Gap</div><div class="rc-gap">${stats.best!==Infinity?(stats.best<=-6?'🏆 Record!':stats.best-(-6)+' shots'):'—'}</div></div>
    </div>`:``}
  </div>`;
}
function getStats(name) {
  const rs = state.rounds.filter(r=>r.player===name);
  if(!rs.length) return null;
  const allHoles = rs.flatMap(r=>r.holes.filter(h=>h!=null));
  const birdies=allHoles.filter(h=>h===1).length;
  const pars=allHoles.filter(h=>h===2).length;
  const bogeys=allHoles.filter(h=>h===3).length;
  const doubles=allHoles.filter(h=>h>=4).length;
  return {
    rounds:rs.length,
    avg:(rs.reduce((s,r)=>s+r.score,0)/rs.length).toFixed(1),
    best:Math.min(...rs.map(r=>r.score)),
    worst:Math.max(...rs.map(r=>r.score)),
    avgBirdies:(birdies/rs.length).toFixed(1),
    avgPars:(pars/rs.length).toFixed(1),
    avgBogeys:(bogeys/rs.length).toFixed(1),
    avgDoubles:(doubles/rs.length).toFixed(1),
    birdieRate:allHoles.length?((birdies/allHoles.length)*100).toFixed(0):0,
    chartData:rs.map((r,i)=>({round:i+1,score:r.score})),
  };
}
function drawChartForPlayer(name) {
  const stats = getStats(name);
  if(stats && stats.chartData.length>1) drawChart('scoreChart', stats.chartData);
}
function switchPlayer(name) { selPlayer=name; render(); }
function attachStatsListeners() {
  if(selPlayer) drawChartForPlayer(selPlayer);
}
function attachListeners() {}
render();
</script>
</body>
</html>
